AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: newpodcaster — daily BBC podcast generator (football + f1 + india)

Parameters:
  S3BucketName:
    Type: String
    Description: S3 bucket for audio + index (must exist before deploy)
  GeminiSecretName:
    Type: String
    Default: newpodcaster/gemini_api_key
    Description: Secrets Manager entry holding the Gemini API key

Globals:
  Function:
    Runtime: python3.12
    Timeout: 900        # 15 minutes (Lambda max) — 5 articles × ~160s + 4 × 21s sleeps fits comfortably
    MemorySize: 1024
    Architectures:
      - arm64

Resources:
  GeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: newpodcaster-generator
      CodeUri: src/
      Handler: generator.handler.handler
      LoggingConfig:
        LogFormat: JSON
        ApplicationLogLevel: INFO
        SystemLogLevel: INFO
      Environment:
        Variables:
          S3_BUCKET: !Ref S3BucketName
          GEMINI_SECRET_NAME: !Ref GeminiSecretName
          LOG_LEVEL: INFO
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:ListBucket
              Resource:
                - !Sub arn:aws:s3:::${S3BucketName}
                - !Sub arn:aws:s3:::${S3BucketName}/*
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GeminiSecretName}*
      Events:
        # Three daily invocations, one per topic. Spaced ~20 minutes apart so
        # they don't run concurrently and stomp on episodes.json (single writer).
        # Times below are UTC; 16:00 UTC = 09:00 PDT (or 08:00 PST in winter).
        DailyCronFootball:
          Type: Schedule
          Properties:
            Schedule: cron(0 16 * * ? *)
            Description: Daily football run
            Enabled: true
            Input: '{"topic": "football"}'
        DailyCronF1:
          Type: Schedule
          Properties:
            Schedule: cron(20 16 * * ? *)
            Description: Daily F1 run
            Enabled: true
            Input: '{"topic": "f1"}'
        DailyCronIndia:
          Type: Schedule
          Properties:
            Schedule: cron(40 16 * * ? *)
            Description: Daily India run
            Enabled: true
            Input: '{"topic": "india"}'
        DailyCronHindi:
          Type: Schedule
          Properties:
            Schedule: cron(0 17 * * ? *)
            Description: Daily Hindi (Hinglish) run from BBC Hindi feed
            Enabled: true
            Input: '{"topic": "hindi"}'

Outputs:
  FunctionName:
    Value: !Ref GeneratorFunction
  FunctionArn:
    Value: !GetAtt GeneratorFunction.Arn
